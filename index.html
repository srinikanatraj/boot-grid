<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Grid Project</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .box {
      background: #0d6efd;
      color: white;
      padding: 20px;
      text-align: center;
      border: 2px solid white;
    }
  </style>
</head>

<body class="container mt-4">

  <h2 class="text-center mb-4">Responsive Grid System</h2>

  <!-- Example 1: Basic -->
  <h4>1. Equal Columns</h4>
  <div class="row">
    <div class="col box">1</div>
    <div class="col box">2</div>
    <div class="col box">3</div>
  </div>

  <hr>

  <!-- Example 2: Mobile First -->
  <h4>2. Mobile First Layout</h4>
  <div class="row">
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 box">Box 1</div>
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 box">Box 2</div>
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 box">Box 3</div>
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 box">Box 4</div>
  </div>

  <hr>

  <!-- Example 3: Mixed Layout -->
  <h4>3. Mixed Layout</h4>
  <div class="row">
    <div class="col-12 col-md-8 box">Main Content</div>
    <div class="col-12 col-md-4 box">Sidebar</div>
  </div>

  <hr>

  <!-- Example 4: Complex Responsive -->
  <h4>4. Dynamic Layout</h4>
  <div class="row">
    <div class="col-6 col-sm-4 col-md-3 col-lg-2 col-xl-1 box">1</div>
    <div class="col-6 col-sm-4 col-md-3 col-lg-2 col-xl-1 box">2</div>
    <div class="col-6 col-sm-4 col-md-3 col-lg-2 col-xl-1 box">3</div>
    <div class="col-6 col-sm-4 col-md-3 col-lg-2 col-xl-1 box">4</div>
    <div class="col-6 col-sm-4 col-md-3 col-lg-2 col-xl-1 box">5</div>
    <div class="col-6 col-sm-4 col-md-3 col-lg-2 col-xl-1 box">6</div>
  </div>

  <hr>

  <!-- Example 5: Auto Layout -->
  <h4>5. Auto Layout</h4>
  <div class="row">
    <div class="col box">Auto</div>
    <div class="col-6 box">Fixed</div>
    <div class="col box">Auto</div>
  </div>

</body>
</html>
